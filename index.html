<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>林于右｜數位名片</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: rgba(255, 255, 255, 0.85);
      --text: #191919;
      --subtext: #6b6b6b;
      --border: #e7e5e4;
      --button: #ffffff;
      --button-hover: #f1f1ef;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
    }

    body.dark {
      --bg: #000000;
      --card: rgba(28, 28, 28, 0.9);
      --text: #f5f5f5;
      --subtext: #b0b0b0;
      --border: #2b2b2b;
      --button: #1d1d1d;
      --button-hover: #2a2a2a;
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.6s ease, color 0.3s ease;
      cursor: pointer;
    }

    body.image-bg {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 28px 32px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: background 0.35s ease, border-color 0.35s ease;
      cursor: default;
    }

    .avatar {
      width: 132px;
      height: 132px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      position: relative;
    }

    .avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .avatar:active {
      transform: scale(0.96);
    }

    .avatar.active {
      transform: scale(1.08);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.16);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .surprise-image {
      position: fixed;
      top: 50%;
      width: min(34vw, 340px);
      max-width: 340px;
      opacity: 0;
      pointer-events: none;
      transform: translate(45vw, -50%);
      z-index: 20;
      will-change: transform, opacity;
    }

    .surprise-image.show {
      animation: surpriseSlide 4.1s ease-in-out forwards;
    }

    @keyframes surpriseSlide {
      0% {
        opacity: 0;
        transform: translate(45vw, -50%);
      }
      10% {
        opacity: 1;
        transform: translate(0, -50%);
      }
      68% {
        opacity: 1;
        transform: translate(0, -50%);
      }
      100% {
        opacity: 0;
        transform: translate(-45vw, -50%);
      }
    }

    @media (max-width: 640px) {
      .surprise-image {
        width: min(48vw, 260px);
      }

      @keyframes surpriseSlide {
        0% {
          opacity: 0;
          transform: translate(55vw, -50%);
        }
        10% {
          opacity: 1;
          transform: translate(0, -50%);
        }
        68% {
          opacity: 1;
          transform: translate(0, -50%);
        }
        100% {
          opacity: 0;
          transform: translate(-55vw, -50%);
        }
      }
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
    }

    .subtitle {
      margin: 10px 0 28px;
      font-size: 16px;
      color: var(--subtext);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--button);
      color: var(--text);
      text-decoration: none;
      transition: 0.2s;
    }

    .link-btn:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
    }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: var(--subtext);
    }
  </style>
</head>
<body id="page">

  <main class="card">
    <div class="avatar">
      <img src="000.png" alt="頭像">
    </div>

    <h1>林于右</h1>
    <p class="subtitle">我是熱愛旮旯給母的大學生</p>

    <div class="links">
      <a class="link-btn" href="https://www.instagram.com/nemuri_ni_hitaritai/" target="_blank">Instagram</a>
      <a class="link-btn" href="https://x.com/NeLa481_0525" target="_blank">X</a>
      <a class="link-btn" href="https://github.com/RamenCat481" target="_blank">GitHub</a>
    </div>

    <p class="hint">點擊背景切換場景，點頭像則會觸發額外互動</p>
  </main>

  <img src="003.png" alt="互動圖片" class="surprise-image" id="surpriseImage">

  <script>
    const page = document.getElementById("page");
    const card = document.querySelector(".card");
    const avatar = document.querySelector(".avatar");
    const surpriseImage = document.getElementById("surpriseImage");

    const audio = new Audio("002_001.ogg");
    audio.loop = true;
    audio.volume = 0.8;

    const avatarSfx1 = new Audio("001_001.ogg");
    const avatarSfx2 = new Audio("001_002.ogg");

    let mode = 0;
    let fadeInterval = null;
    let avatarTimeout = null;

    function clearFade() {
      if (fadeInterval) clearInterval(fadeInterval);
    }

    function playAudio() {
      clearFade();
      audio.volume = 0.8;
      audio.play().catch(() => {});
    }

    function fadeOut() {
      clearFade();
      fadeInterval = setInterval(() => {
        if (audio.volume > 0.05) {
          audio.volume -= 0.05;
        } else {
          audio.pause();
          audio.currentTime = 0;
          audio.volume = 0.8;
          clearFade();
        }
      }, 120);
    }

    function reset() {
      document.body.classList.remove("dark", "image-bg");
      document.body.style.backgroundImage = "none";
    }

    function applyMode() {
      reset();

      if (mode === 1) {
        document.body.classList.add("dark");
        audio.pause();
      } else if (mode === 2) {
        document.body.classList.add("image-bg");
        document.body.style.backgroundImage = 'url("001.png")';
        playAudio();
      } else if (mode === 3) {
        document.body.classList.add("image-bg");
        document.body.style.backgroundImage = 'url("002.png")';
        playAudio();
      } else {
        fadeOut();
      }
    }

    function triggerAvatarEffect() {
      if (avatarTimeout) {
        clearTimeout(avatarTimeout);
        avatarTimeout = null;
      }

      avatar.classList.remove("active");
      void avatar.offsetWidth;
      avatar.classList.add("active");

      surpriseImage.classList.remove("show");
      void surpriseImage.offsetWidth;
      surpriseImage.classList.add("show");

      avatarSfx1.currentTime = 0;
      avatarSfx1.play().catch(() => {});

      avatarTimeout = setTimeout(() => {
        avatarSfx2.currentTime = 0;
        avatarSfx2.play().catch(() => {});
      }, 800);

      setTimeout(() => {
        avatar.classList.remove("active");
      }, 260);
    }

    page.addEventListener("click", () => {
      mode = (mode + 1) % 4;
      applyMode();
    });

    card.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    avatar.addEventListener("click", (e) => {
      e.stopPropagation();
      triggerAvatarEffect();
    });

    surpriseImage.addEventListener("animationend", () => {
      surpriseImage.classList.remove("show");
    });
  </script>

</body>
</html>
