<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>林于右｜數位名片</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: rgba(255, 255, 255, 0.85);
      --text: #191919;
      --subtext: #6b6b6b;
      --border: #e7e5e4;
      --button: #ffffff;
      --button-hover: #f1f1ef;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
    }

    body.dark {
      --bg: #111111;
      --card: rgba(28, 28, 28, 0.9);
      --text: #f5f5f5;
      --subtext: #b0b0b0;
      --border: #2b2b2b;
      --button: #1d1d1d;
      --button-hover: #2a2a2a;
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 0, 0, 0.02), transparent 35%),
        var(--bg);
      color: var(--text);
      transition: background 0.35s ease, color 0.35s ease;
      cursor: pointer;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 28px 32px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: background 0.35s ease, border-color 0.35s ease, transform 0.25s ease;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .avatar {
      width: 132px;
      height: 132px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background:
        linear-gradient(135deg, rgba(0,0,0,0.04), rgba(0,0,0,0.01)),
        #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
      font-size: 14px;
      letter-spacing: 0.04em;
      overflow: hidden;
      transition: border-color 0.35s ease, background 0.35s ease, color 0.35s ease;
    }

    body.dark .avatar {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        #171717;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 10px 0 28px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--subtext);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--button);
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.25s ease, transform 0.2s ease, border-color 0.35s ease, color 0.35s ease;
    }

    .link-btn:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: var(--subtext);
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 22px 26px;
        border-radius: 24px;
      }

      .avatar {
        width: 112px;
        height: 112px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body id="page">
  <main class="card" aria-label="個人數位名片">
    <div class="avatar" aria-label="大頭照佔位符">
      PHOTO
    </div>

    <h1>林于右</h1>
    <p class="subtitle">我是熱愛旮旯給母的大學生</p>

    <section class="links" aria-label="社群連結">
      <a class="link-btn" href="https://www.instagram.com/nemuri_ni_hitaritai/" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a class="link-btn" href="https://x.com/NeLa481_0525" target="_blank" rel="noopener noreferrer">X</a>
      <a class="link-btn" href="https://github.com/RamenCat481" target="_blank" rel="noopener noreferrer">GitHub</a>
    </section>

    <p class="hint">點一下背景，會有小驚喜。</p>
  </main>

  <script>
    const page = document.getElementById('page');
    const card = document.querySelector('.card');

    page.addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });

    card.addEventListener('click', (event) => {
      event.stopPropagation();
    });
  </script>
</body>
</html>
